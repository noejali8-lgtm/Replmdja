<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OMEGA IDE - بيئة التطوير الكاملة</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #0d1117; color: #e6edf3; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .container { text-align: center; padding: 2rem; max-width: 600px; }
    h1 { font-size: 3rem; font-weight: 800; margin-bottom: 1rem; background: linear-gradient(135deg, #58a6ff, #bc8cff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    p { color: #8b949e; font-size: 1.125rem; line-height: 1.6; margin-bottom: 2rem; }
    .btn { display: inline-block; background: #58a6ff; color: #fff; padding: 0.875rem 2rem; border-radius: 0.75rem; border: none; font-size: 1rem; font-weight: 600; cursor: pointer; transition: opacity 0.2s; }
    .btn:hover { opacity: 0.85; }
  </style>
</head>
<body>
  <div class="container">
    <h1>OMEGA IDE - بيئة التطوير الكاملة</h1>
    <p>بيئة تطوير متكاملة مثل Replit</p>
    <button class="btn" onclick="alert('Hello from OMEGA IDE - بيئة التطوير الكاملة!')">Get Started</button>
  </div>
</body>
</html>
